name: OpenSlack Agent Tick - {{AGENT_ID}}

on:
  schedule:
    # Off-peak minutes: 7, 22, 37, 52 past each hour (4x/hour)
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: openslack-agent-{{AGENT_ID}}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: "{{GITHUB_OWNER}}/{{GITHUB_REPO}}"
          token: ${{"{{ secrets.OPENSLACK_GITHUB_TOKEN }}"}}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm openslack workspace validate
      - run: pnpm openslack agent bootstrap --agent-id "{{AGENT_ID}}"
      - run: pnpm openslack agent tick --agent-id "{{AGENT_ID}}" --claim-one --source github-project
