schema: openslack.workflow_template.v1
id: research
name: Research
description: Investigate a topic in an isolated worktree, then hand findings off to a human reviewer with a recorded decision.
riskLevel: low
tags:
  - research
  - handoff
  - decision-record
inputs:
  - name: title
    type: string
    required: true
    description: Short summary of the research topic
  - name: issueNumber
    type: integer
    required: true
    description: GitHub issue number tracking the research task
  - name: agentId
    type: string
    required: true
    description: Agent principal assigned to the research
phases:
  - name: Investigate
    steps:
      - type: action
        actionId: task.create.preview
        title: Preview research task
        input:
          title: "{{inputs.title}}"
          template: investigation
      - type: action
        actionId: task.checkout
        title: Create worktree for research
        input:
          issueNumber: "{{inputs.issueNumber}}"
          agentId: "{{inputs.agentId}}"
  - name: Report
    steps:
      - type: handoff
        from: "{{inputs.agentId}}"
        to: human
        context: "Research complete: {{inputs.title}}"
        issueRef: "{{inputs.issueNumber}}"
      - type: record-decision
        topic: "Research findings: {{inputs.title}}"
        decision: Research completed
        rationale: Agent investigation finished, findings handed off to human
        decidedBy: "{{inputs.agentId}}"
        tags:
          - research
          - handoff
