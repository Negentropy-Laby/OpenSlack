schema: openslack.workflow_template.v1
id: feature
name: Feature
description: Plan, implement, and merge a new feature with reviewer approval gate.
riskLevel: medium
tags:
  - feature
  - code-review
  - approval-gate
inputs:
  - name: title
    type: string
    required: true
    description: Short summary of the feature being implemented
  - name: issueNumber
    type: integer
    required: true
    description: GitHub issue number tracking the feature
  - name: prNumber
    type: integer
    required: true
    description: Pull request number for the feature
  - name: agentId
    type: string
    required: true
    description: Agent principal assigned to the feature
  - name: paths
    type: string
    required: true
    description: Comma-separated file paths affected by the feature
phases:
  - name: Plan
    steps:
      - type: action
        actionId: task.create.preview
        title: Preview feature task
        input:
          title: "{{inputs.title}}"
          template: investigation
      - type: action
        actionId: task.checkout
        title: Create worktree for feature
        input:
          issueNumber: "{{inputs.issueNumber}}"
          agentId: "{{inputs.agentId}}"
  - name: Implement
    steps:
      - type: action
        actionId: task.sync
        title: Propose feature PR
        input:
          issueNumber: "{{inputs.issueNumber}}"
          agentId: "{{inputs.agentId}}"
          paths: "{{inputs.paths}}"
  - name: Review
    steps:
      - type: action
        actionId: pr.doctor
        title: Diagnose PR readiness
        input:
          prNumber: "{{inputs.prNumber}}"
      - type: decision-gate
        title: Approve feature for merge
        requiredRole: reviewer
      - type: action
        actionId: pr.merge
        title: Merge feature PR
        input:
          prNumber: "{{inputs.prNumber}}"
