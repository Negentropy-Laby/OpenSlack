schema: openslack.workflow_template.v1
id: feature
name: Feature
inputs:
  - name: title
    type: string
    required: true
  - name: issueNumber
    type: integer
    required: true
  - name: prNumber
    type: integer
    required: true
  - name: agentId
    type: string
    required: true
  - name: paths
    type: string
    required: true
phases:
  - name: Plan
    steps:
      - type: action
        actionId: task.create.preview
        title: Preview feature task
        input:
          title: "{{inputs.title}}"
          template: investigation
      - type: action
        actionId: task.checkout
        title: Create worktree for feature
        input:
          issueNumber: "{{inputs.issueNumber}}"
          agentId: "{{inputs.agentId}}"
  - name: Implement
    steps:
      - type: action
        actionId: task.sync
        title: Propose feature PR
        input:
          issueNumber: "{{inputs.issueNumber}}"
          agentId: "{{inputs.agentId}}"
          paths: "{{inputs.paths}}"
  - name: Review
    steps:
      - type: action
        actionId: pr.doctor
        title: Diagnose PR readiness
        input:
          prNumber: "{{inputs.prNumber}}"
      - type: decision-gate
        title: Approve feature for merge
        requiredRole: reviewer
      - type: action
        actionId: pr.merge
        title: Merge feature PR
        input:
          prNumber: "{{inputs.prNumber}}"
