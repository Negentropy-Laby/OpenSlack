schema: openslack.workflow_template.v1
id: incident
name: Incident
description: Triage, fix, and resolve a production incident with maintainer approval and handoff to human.
riskLevel: high
tags:
  - incident
  - production
  - approval-gate
  - handoff
inputs:
  - name: title
    type: string
    required: true
    description: Short summary of the incident
  - name: issueNumber
    type: integer
    required: true
    description: GitHub issue number tracking the incident
  - name: prNumber
    type: integer
    required: true
    description: Pull request number for the incident fix
  - name: agentId
    type: string
    required: true
    description: Agent principal assigned to the incident
  - name: paths
    type: string
    required: true
    description: Comma-separated file paths affected by the fix
phases:
  - name: Triage
    steps:
      - type: action
        actionId: task.create.preview
        title: Preview incident task
        input:
          title: '{{inputs.title}}'
          template: investigation
      - type: action
        actionId: task.checkout
        title: Create worktree for incident
        input:
          issueNumber: '{{inputs.issueNumber}}'
          agentId: '{{inputs.agentId}}'
  - name: Fix
    steps:
      - type: action
        actionId: task.sync
        title: Propose incident fix PR
        input:
          issueNumber: '{{inputs.issueNumber}}'
          agentId: '{{inputs.agentId}}'
          paths: '{{inputs.paths}}'
      - type: handoff
        from: '{{inputs.agentId}}'
        to: human
        context: 'Incident fix ready for review: {{inputs.title}}'
        issueRef: '{{inputs.issueNumber}}'
  - name: Approve
    steps:
      - type: action
        actionId: pr.doctor
        title: Diagnose PR readiness
        input:
          prNumber: '{{inputs.prNumber}}'
      - type: decision-gate
        title: Approve incident fix for merge
        requiredRole: maintainer
      - type: action
        actionId: pr.merge
        title: Merge incident fix PR
        input:
          prNumber: '{{inputs.prNumber}}'
