schema: openslack.workflow_template.v1
id: bugfix
name: Bug Fix
description: Diagnose, implement, and merge a targeted bug fix with reviewer approval gate.
riskLevel: medium
tags:
  - bugfix
  - code-review
  - approval-gate
inputs:
  - name: title
    type: string
    required: true
    description: Short summary of the bug being fixed
  - name: issueNumber
    type: integer
    required: true
    description: GitHub issue number tracking the bug
  - name: prNumber
    type: integer
    required: true
    description: Pull request number for the fix
  - name: agentId
    type: string
    required: true
    description: Agent principal assigned to the fix
  - name: paths
    type: string
    required: true
    description: Comma-separated file paths affected by the fix
phases:
  - name: Diagnosis
    steps:
      - type: action
        actionId: task.create.preview
        title: Preview bug-fix task
        input:
          title: '{{inputs.title}}'
          template: investigation
      - type: action
        actionId: task.checkout
        title: Create worktree for bug fix
        input:
          issueNumber: '{{inputs.issueNumber}}'
          agentId: '{{inputs.agentId}}'
  - name: Implementation
    steps:
      - type: action
        actionId: task.sync
        title: Propose fix PR
        input:
          issueNumber: '{{inputs.issueNumber}}'
          agentId: '{{inputs.agentId}}'
          paths: '{{inputs.paths}}'
  - name: Review
    steps:
      - type: action
        actionId: pr.doctor
        title: Diagnose PR readiness
        input:
          prNumber: '{{inputs.prNumber}}'
      - type: decision-gate
        title: Approve bug fix for merge
        requiredRole: reviewer
      - type: action
        actionId: pr.merge
        title: Merge bug-fix PR
        input:
          prNumber: '{{inputs.prNumber}}'
