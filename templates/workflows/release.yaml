schema: openslack.workflow_template.v1
id: release
name: Release
description: Queue, verify, approve, and merge a release PR with maintainer approval gate.
riskLevel: high
tags:
  - release
  - approval-gate
  - maintainer
inputs:
  - name: prNumber
    type: integer
    required: true
    description: Pull request number for the release
phases:
  - name: Queue
    steps:
      - type: action
        actionId: pr.queue
        title: Show PR queue
  - name: Verify
    steps:
      - type: action
        actionId: pr.doctor
        title: Diagnose release PR readiness
        input:
          prNumber: '{{inputs.prNumber}}'
  - name: Approve
    steps:
      - type: decision-gate
        title: Approve release for merge
        requiredRole: maintainer
  - name: Merge
    steps:
      - type: action
        actionId: pr.merge
        title: Merge release PR
        input:
          prNumber: '{{inputs.prNumber}}'
