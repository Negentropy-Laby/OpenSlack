name: OpenSlack TUI Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/tui/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tui-visual-gate:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      # Setup bun
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: TUI tests (all)
        run: bun vitest run packages/tui/ --reporter=verbose

      - name: Column snapshot matrix
        run: bun vitest run packages/tui/src/__tests__/column-snapshot-matrix.test.tsx

      - name: CJK coverage
        run: bun vitest run packages/tui/src/__tests__/cjk-emoji-ansi-coverage.test.tsx

      - name: Visual stress tests
        run: bun vitest run packages/tui/src/__tests__/visual/

      - name: Plain fallback render
        run: bun vitest run packages/tui/src/__tests__/plain-render.test.ts

      - name: Lifecycle tests
        run: bun vitest run packages/tui/src/__tests__/lifecycle/
