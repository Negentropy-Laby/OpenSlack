name: OpenSlack Release Artifacts

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/openslack-release.yml'
      - '.openslack/modules.yaml'
      - 'apps/**'
      - 'packages/**'
      - 'templates/**'
      - 'scripts/release/**'
      - 'docs/guides/install-openslack.md'
      - 'docs/guides/manual-upgrade-rollback.md'
      - 'docs/status/current.md'
      - '.gitattributes'
      - 'bun.lock'
      - 'package.json'
      - 'tsconfig.json'
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and smoke ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-2022
          - target: linux-x64
            runner: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/v') && 'stable' || 'rc' }}

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          package-manager-cache: false

      # oven-sh/setup-bun v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - name: Typecheck release and runtime sources
        run: bun run typecheck

      - name: Require tag to match the package version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${package_version}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${package_version}." >&2
            exit 1
          fi

      - name: Build unsigned PR or development archive and run unpacked smoke
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: >-
          bun run release:build
          --target "${{ matrix.target }}"
          --channel "$RELEASE_CHANNEL"
          --out-dir dist/release

      - name: Build signed tag archive and run unpacked smoke
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          OPENSLACK_RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.OPENSLACK_RELEASE_SIGNING_PRIVATE_KEY }}
          OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY: ${{ secrets.OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY }}
        run: >-
          bun run release:build
          --target "${{ matrix.target }}"
          --channel "$RELEASE_CHANNEL"
          --out-dir dist/release
          --require-signature

      - name: Verify unsigned PR or development release manifest
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find dist/release -maxdepth 1 -name '*.release-manifest.json')
          test "${#manifests[@]}" -eq 1
          bun run release:verify --manifest "${manifests[0]}"

      - name: Verify trusted tag release signature and manifest
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY: ${{ secrets.OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find dist/release -maxdepth 1 -name '*.release-manifest.json')
          test "${#manifests[@]}" -eq 1
          bun run release:verify --manifest "${manifests[0]}" \
            --require-signature \
            --public-key-env OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY

      # actions/upload-artifact v7.0.0
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: openslack-release-${{ matrix.target }}
          path: |
            dist/release/*.zip
            dist/release/*.tar.gz
            dist/release/*.release-manifest.json
            dist/release/*.sbom.cdx.json
            dist/release/*.provenance.intoto.json
            dist/release/*.provenance.intoto.json.sig
            dist/release/*.SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish tag release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # oven-sh/setup-bun v2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      # actions/download-artifact v8.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: openslack-release-*
          path: release-assets
          merge-multiple: true

      - name: Verify aggregate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          test "$(find . -maxdepth 1 -name '*.SHA256SUMS' | wc -l)" -eq 2
          for checksum_file in *.SHA256SUMS; do
            sha256sum --check "$checksum_file"
          done

      - name: Verify every tag artifact has trusted provenance
        shell: bash
        env:
          OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY: ${{ secrets.OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find release-assets -maxdepth 1 -name '*.release-manifest.json' | sort)
          test "${#manifests[@]}" -eq 2
          for manifest in "${manifests[@]}"; do
            bun scripts/release/verify.ts --manifest "$manifest" \
              --require-signature \
              --public-key-env OPENSLACK_RELEASE_TRUSTED_PUBLIC_KEY
          done

      - name: Publish immutable GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            published_assets="$(mktemp -d)"
            trap 'rm -rf "$published_assets"' EXIT
            gh release download "$GITHUB_REF_NAME" --dir "$published_assets"
            bun scripts/release/immutable-assets.ts \
              --expected release-assets \
              --actual "$published_assets"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --title "OpenSlack $GITHUB_REF_NAME" \
              --generate-notes
          fi
