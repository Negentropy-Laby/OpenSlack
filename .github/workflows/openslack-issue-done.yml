name: OpenSlack Issue Done

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  on-pr-merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false
      # Setup bun
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Extract linked issue from PR body
        id: extract
        # actions/github-script v8.0.0
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/Issue:\s*#?(\d+)/i);
            if (match) {
              core.setOutput('issue_number', match[1]);
              core.info(`Found linked issue: #${match[1]}`);
            } else {
              core.info('No OpenSlack issue reference found in PR body.');
            }

      - name: Complete linked issue
        if: steps.extract.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSLACK_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          bun run openslack github issue-done \
            --issue-number "${{ steps.extract.outputs.issue_number }}" \
            --pr-url "${{ github.event.pull_request.html_url }}"
