name: OpenSlack Issue Done

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  on-pr-merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          package-manager-cache: false
      # Setup bun
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Extract verified task link from PR body
        id: extract
        # actions/github-script v8.0.0
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/<!--\s*openslack-task-link\s*([\s\S]*?)-->/);
            if (!match) {
              core.info('No structured OpenSlack task link found in PR body.');
              return;
            }
            let taskLink;
            try {
              taskLink = JSON.parse(match[1].trim());
            } catch {
              core.setFailed('The OpenSlack task-link marker is not valid JSON.');
              return;
            }
            const expectedRef = `refs/heads/openslack/claims/issue-${taskLink.issue_number}`;
            if (
              taskLink.schema !== 'openslack.task_link.v1' ||
              !Number.isSafeInteger(taskLink.issue_number) ||
              taskLink.issue_number <= 0 ||
              typeof taskLink.agent_id !== 'string' ||
              !/^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$/.test(taskLink.agent_id) ||
              taskLink.claim_ref !== expectedRef
            ) {
              core.setFailed('The OpenSlack task-link marker failed schema validation.');
              return;
            }
            core.setOutput('issue_number', String(taskLink.issue_number));
            core.setOutput('agent_id', taskLink.agent_id);
            core.info(`Found structured OpenSlack task link for issue #${taskLink.issue_number}.`);

      - name: Complete linked issue
        if: steps.extract.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENSLACK_ISSUE_NUMBER: ${{ steps.extract.outputs.issue_number }}
          OPENSLACK_AGENT_ID: ${{ steps.extract.outputs.agent_id }}
          OPENSLACK_PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          bun run openslack github issue-done \
            --issue-number "$OPENSLACK_ISSUE_NUMBER" \
            --agent-id "$OPENSLACK_AGENT_ID" \
            --pr-url "$OPENSLACK_PR_URL"
