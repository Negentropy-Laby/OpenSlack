name: OpenSlack Issue Done

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  on-pr-merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Extract linked issue from PR body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/Issue:\s*#?(\d+)/i);
            if (match) {
              core.setOutput('issue_number', match[1]);
              core.info(`Found linked issue: #${match[1]}`);
            } else {
              core.info('No OpenSlack issue reference found in PR body.');
            }

      - name: Complete linked issue
        if: steps.extract.outputs.issue_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.OPENSLACK_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          pnpm openslack github issue-done \
            --issue-number "${{ steps.extract.outputs.issue_number }}" \
            --pr-url "${{ github.event.pull_request.html_url }}"
