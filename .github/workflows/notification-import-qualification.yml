name: Notification Import Qualification Locator

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refuse-default-branch:
    name: Refuse qualification from the default-branch locator
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Fail closed until the integration workflow is selected
        shell: bash
        run: |
          echo "This default-branch file is only a workflow_dispatch locator." >&2
          echo "Run it with --ref integration/notification-delivery-0.3 after the full integration workflow is merged." >&2
          exit 1
