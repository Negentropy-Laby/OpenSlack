name: OpenSlack Reusable Validate

on:
  workflow_call:
    inputs:
      validation_level:
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      # Install pnpm globally (bypasses pnpm/action-setup download issues)
      - run: npm install -g pnpm@10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Regenerate status doc
        run: pnpm openslack status generate

      - name: Check for uncommitted status changes
        run: git diff --exit-code docs/status/current.md

      - name: Status consistency check
        run: pnpm openslack status verify

      - name: Workspace validate
        run: pnpm openslack workspace validate

      - name: Policy validate
        run: pnpm openslack self validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Self eval
        run: pnpm openslack self eval --suite golden

      - name: Security scan (black zone check)
        run: pnpm openslack self classify-pr --paths "$(git diff --name-only HEAD~1 || echo docs/test.md)" --format json
