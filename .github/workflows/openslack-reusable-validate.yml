name: OpenSlack Reusable Validate

on:
  workflow_call:
    inputs:
      validation_level:
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - name: Workspace validate
        run: pnpm openslack workspace validate

      - name: Policy validate
        run: pnpm openslack policy validate --self-evolution 2>/dev/null || echo "Policy validate: not yet implemented"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint 2>/dev/null || echo "Lint: skipped (no eslint config)"

      - name: Tests
        run: pnpm test

      - name: Self eval
        run: pnpm openslack self eval --suite golden 2>/dev/null || echo "Self eval: not yet implemented"

      - name: Security scan
        run: pnpm openslack self scan-secrets 2>/dev/null || echo "Security scan: not yet implemented"
