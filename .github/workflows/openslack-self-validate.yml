name: OpenSlack Self Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      risk_zone: ${{ steps.classify.outputs.risk_zone }}
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      # Install pnpm globally (bypasses pnpm/action-setup download issues)
      - run: npm install -g pnpm@10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Classify PR risk zone
        id: classify
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | paste -sd ',' -)
          echo "Changed paths: $CHANGED"
          RESULT=$(pnpm --silent openslack self classify-pr --paths "$CHANGED" --format json 2>/dev/null || echo '{"riskZone":"unknown"}')
          echo "$RESULT"
          ZONE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('riskZone','unknown'))")
          echo "risk_zone=$ZONE" >> $GITHUB_OUTPUT

      - name: Comment PR with classification
        # actions/github-script v8.0.0
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const zone = '${{ steps.classify.outputs.risk_zone }}';
            const body = `## OSEK PR Classification

            **Risk Zone:** ${zone}

            ${zone === 'black' ? '❌ Black Zone — PR cannot be merged.' : ''}
            ${zone === 'red' ? '🔴 Red Zone — Human approval required.' : ''}
            ${zone === 'yellow' ? '🟡 Yellow Zone — Independent agent review required.' : ''}
            ${zone === 'green' ? '🟢 Green Zone — Auto-merge eligible.' : ''}
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  validate:
    needs: classify
    if: needs.classify.outputs.risk_zone != 'black'
    uses: ./.github/workflows/openslack-reusable-validate.yml
    with:
      validation_level: ${{ needs.classify.outputs.risk_zone }}
