name: OpenSlack Self Observe

on:
  schedule:
    # Off-peak minutes to reduce contention
    - cron: "13 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      # Install pnpm globally (bypasses pnpm/action-setup download issues)
      - run: npm install -g pnpm@10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Observe OpenSlack health
        run: pnpm openslack self observe

      - name: Create evolution tasks
        run: pnpm openslack self triage --create-issues
