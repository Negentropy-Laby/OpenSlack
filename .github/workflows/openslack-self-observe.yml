name: OpenSlack Self Observe

on:
  schedule:
    # Off-peak minutes to reduce contention
    - cron: "13 */4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - name: Observe OpenSlack health
        run: pnpm openslack self observe

      - name: Create evolution tasks
        run: pnpm openslack self triage --create-issues
