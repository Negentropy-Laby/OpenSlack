name: OpenSlack Self Canary

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node v6.4.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          package-manager-cache: false

      # pnpm/action-setup v6.0.8
      - uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run canary company bootstrap
        run: |
          pnpm openslack workspace validate
          pnpm openslack self eval --suite golden

      - name: Run canary agent claim flow
        run: pnpm openslack self classify-pr --paths "apps/cli/src/index.ts" --format json
# Red zone test
