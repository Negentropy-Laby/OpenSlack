name: OpenSlack Self Canary

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run canary company bootstrap
        run: |
          pnpm openslack workspace validate
          pnpm openslack self eval --suite golden

      - name: Run canary agent claim flow
        run: pnpm openslack self classify-pr --paths "apps/cli/src/index.ts" --format json
# Red zone test
