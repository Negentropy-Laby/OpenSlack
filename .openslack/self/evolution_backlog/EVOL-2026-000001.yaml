schema: openslack.evolution_task.v1
id: EVOL-2026-000001
title: "OSEK bootstrapping — initial self-evolution infrastructure"
description: >
  First evolution task for OpenSlack. Establishes the Self-Project Mode,
  constitution, invariants, zone classifier, and golden eval suite.
status: implementing
created_at: "2026-05-15T00:00:00Z"
created_by: "agent:anthropic_architect_aby"
depends_on: []

source:
  type: "user_feedback"
  evidence:
    - "OSEK design document approved"
    - "Implementation plan approved"

problem:
  summary: "OpenSlack has no self-evolution infrastructure. It cannot validate or classify changes to itself."
  affected_modules:
    - "all"

hypothesis:
  statement: "Building the OSEK module as the first OpenSlack module ensures all subsequent modules are built with guardrails."
  expected_metric_change:
    self_validation_coverage: "> 0"
    zone_classification_accuracy: "100%"

risk:
  level: "low"
  reasons:
    - "This is infrastructure setup, not a runtime change"
  protected_paths_touched: false
  human_approval_required: false

constraints:
  allowed_paths:
    - "**"
  forbidden_paths:
    - ".env"
    - "secrets/**"
    - "credentials/**"

validation:
  required:
    - "pnpm typecheck"
    - "pnpm test"
    - "bash scripts/genesis-validate.sh"
    - "openslack workspace validate"

output_contract:
  must_include:
    - "openslack.yaml"
    - ".openslack/**"
    - "packages/**"
    - "scripts/genesis-validate.sh"
    - "scripts/genesis-rollback.sh"
    - ".github/workflows/*.yml"
