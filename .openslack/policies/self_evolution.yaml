schema: openslack.self_evolution_policy.v1

zones:
  # Only explicit Green paths are auto-merge eligible. Any unmatched path
  # defaults to Yellow in the kernel classifier.
  fallback_zone: yellow

  green:
    auto_merge_allowed: true
    paths:
      - docs/**
      - templates/**
      - .openslack/tasks/**
      - .openslack/audit/**
      - .openslack/self/scorecards/**
      - .openslack/self/experiments/**

  yellow:
    auto_merge_allowed: false
    requires_independent_agent_review: true
    requires_all_checks: true
    paths:
      - apps/**
      - packages/core/**
      - packages/workspace/**
      - packages/runtime/**
      - packages/github/**
      - packages/pr/**
      - packages/operator/**
      - packages/chat-gateway/**
      - packages/collaboration/**
      - packages/agent-runtime/**
      - packages/tui/**
      - packages/workflows/**
      - .openslack/self/eval_suites/**

  red:
    auto_merge_allowed: false
    requires_human_approval: true
    requires_independent_agent_review: true
    requires_security_review: true
    paths:
      - AGENTS.md
      - CLAUDE.md
      - .github/**
      - .openslack/policies/**
      - .openslack/agents/registry/**
      - .openslack/agents/prompts/**
      - .openslack/plugins/**
      - .openslack/plugins.lock
      - .openslack/self/constitution.md
      - .openslack/self/invariants.yaml
      - packages/kernel/src/**
      - packages/plugin-host/**

  black:
    push_allowed: false
    paths:
      - .env
      - "**/*.pem"
      - "**/*.key"
      - secrets/**
      - credentials/**
      - private/**
      - production-tokens/**

agent_rules:
  no_self_prompt_edit: true
  no_self_registry_edit: true
  no_self_review: true
  no_self_merge: true
  no_policy_bypass: true
  no_direct_main_push: true

merge_rules:
  green:
    required_checks:
      - openslack/workspace-validate
      - openslack/self-eval
      - openslack/security-scan
    required_agent_reviews: 1
    human_required: false

  yellow:
    required_checks:
      - openslack/workspace-validate
      - openslack/typecheck
      - openslack/unit-tests
      - openslack/integration-tests
      - openslack/self-eval
      - openslack/security-scan
    required_agent_reviews: 2
    human_required: false

  red:
    required_checks:
      - openslack/workspace-validate
      - openslack/typecheck
      - openslack/unit-tests
      - openslack/integration-tests
      - openslack/self-eval
      - openslack/security-scan
      - openslack/policy-audit
    required_agent_reviews: 2
    human_required: true
