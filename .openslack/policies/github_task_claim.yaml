schema: openslack.github_task_claim.v1

# Task claim parameters for GitHub Project-based task discovery.
# Agents use these parameters to filter and claim tasks from the Project board.

claim_broker:
  authority: "Claim Broker"
  atomic: true
  duplicate_prevention: true

lease_defaults:
  ttl_minutes: 60
  heartbeat_interval_minutes: 10
  max_parallel_tasks: 1

task_matching:
  allowed_statuses: ["Ready"]
  excluded_labels: ["human-only", "blocked", "confidential"]
  priority_order: ["p0", "p1", "p2", "p3"]

cooldown:
  after_expiry_minutes: 5
  after_release_minutes: 0
  reason: "Prevents immediate re-claim by same agent type after expiry"

retry:
  max_attempts: 3
  backoff_ms: 1000

evolution_board:
  github_owner: "wsman"
  project_number: 1
  fields:
    status: "OpenSlack Status"
    risk_level: "Risk Level"
    claimed_by: "Claimed By"
    lease_id: "Lease ID"
