name: OpenSlack Agent Tick - operator

on:
  schedule:
    # Off-peak minutes: 7, 22, 37, 52 past each hour (4x/hour)
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: openslack-agent-operator
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'wsman/OpenSlack'
          token: ${{"{{ secrets.OPENSLACK_GITHUB_TOKEN }}"}}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run openslack workspace validate
      - run: bun run openslack agent bootstrap --agent-id "operator"
      - run: bun run openslack agent tick --agent-id "operator" --claim-one --source github-project
