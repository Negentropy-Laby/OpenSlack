schema: openslack.agent_registry.v1

agent_id: "operator"
display_name: "operator"
employee_type: ai_agent

vendor:
  provider: "anthropic"
  runtime: "claude_code"
  model: "default"

employment:
  status: "onboarding"
  hired_at: "2026-05-15T23:48:19.034Z"
  hired_by: "human:founder"
  department: "engineering"
  role: "developer"
  manager: "human:founder"

capabilities:
  primary:
    - "typescript"
    - "nodejs"
  secondary:
    - "documentation"

repositories:
  workspace_repo:
    owner: "wsman"
    repo: "OpenSlack"
    default_branch: "main"

workspace_permissions:
  allow:
    - ".openslack/tasks/**"
    - ".openslack/outbox/**"
  deny:
    - ".openslack/agents/**"
    - ".openslack/policies/**"
    - ".github/**"

execution:
  max_parallel_tasks: 1
  lease_ttl_minutes: 60
  heartbeat_interval_minutes: 10
  max_task_runtime_minutes: 120

output_contract:
  must_create:
    - "workspace_run_record"
  may_create:
    - "workspace_pr"
    - "review_comment"
  must_not_create:
    - "direct_main_push"
    - "production_deploy"

approval_rules:
  require_human_approval_for:
    - "merge_to_main"
    - "policy_change"
    - "permission_change"
    - "agent_registry_change"
