schema: openslack.modules.v1
modules:
  - id: self_evolution
    name: Self-Evolution Kernel
    status: active
    phase: "1.6"
    cli:
      - openslack self
      - openslack workspace
    packages:
      - "@openslack/kernel"
      - "@openslack/workspace"
      - "@openslack/runtime"
    tests: 142
    test_files: 18
    golden_evals: 7

  - id: github_task_loop
    name: GitHub Issues Task Loop
    status: active
    phase: "1.7"
    cli:
      - openslack github
      - openslack agent
      - openslack task
    packages:
      - "@openslack/github"
      - "@openslack/runtime"
      - "@openslack/core"
    tests: 192
    test_files: 25
    notes: "GitHub Issues task loop active with typed task creation, dry-run repair, and Phase 4 watch daemon (webhook receiver, dedupe, console/Slack/webhook notifications, polling fallback, optional auto-claim with agent identity and authorization gates, collaboration event recording)."

  - id: operator
    name: Operator Interface
    status: active
    phase: "2A/2B/2C"
    cli:
      - openslack ask
      - openslack setup
      - openslack status
      - openslack doctor
      - openslack chat
    packages:
      - "@openslack/cli"
      - "@openslack/operator"
      - "@openslack/chat-gateway"
    tests: 144
    test_files: 16
    notes: Structured planner active. Webhook and Slack chat adapters active with actor mapping. PRMS chat cards and action confirmation active. Typed tool registry, optional LLM fallback, setup report, and 24h pending plan store active. Session-based conversation memory with multi-turn context resolution and progressive clarification. Doctor --format plain for non-technical output.

  - id: pr_review_merge
    name: PR Review & Merge Steward
    status: active
    phase: "1.14"
    cli:
      - openslack pr
      - openslack governance
    packages:
      - "@openslack/pr"
      - "@openslack/github"
      - "@openslack/kernel"
    tests: 276
    test_files: 30
    notes: Phase 2C chat report and action confirmation active. Supports status/review/recommend/doctor/queue/merge/watch, review/doctor comments, governance audit, operational decision summaries, deadlock detection, Red Zone author-risk preflight, and chat-friendly PR summaries with confirm-merge flow.

  - id: collaboration
    name: Collaboration Layer
    status: active
    phase: "2D/2E"
    cli:
      - openslack collaboration activity
      - openslack collaboration digest
      - openslack collaboration handoff
      - openslack collaboration decision
      - openslack collaboration room
      - openslack collaboration workflow
    packages:
      - "@openslack/collaboration"
    tests: 103
    test_files: 10
    notes: Full 2D/2E Collaboration Layer active with typed workflow template preview/execute and dashboard with filters (--owner, --module, --risk, --blocker, --type). Event model, activity feed, digest, handoff, decision, and room views with agent display name resolution. Authz-gated chat cards for handoffs, decisions, tasks, workflows, and plans. Agent registry v1 to v2 migration command.
