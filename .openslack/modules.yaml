      - "@openslack/runtime"
    tests: 485
    test_files: 46
    golden_evals: 7
    notes: Stable release verification is available from the installed CLI and requires an out-of-band trusted Ed25519 public key; archive, SBOM, provenance, signature, identity fields, and subjects are verified without a source checkout or Bun. The private plugin preview now provides a zero-runtime-dependency manifest contract, typed SDK helpers, and an instance-scoped Red host with strict exact-byte loading, deterministic integrity lock, independent capability/target policy, atomic per-kind registries, required audit writes, and blockers-only bundled PRMS normalization. The nested self plugin run proof loads locked workspace aliases before seal only for that route, keeps SHADOW visibility non-executable, and canonicalizes ENFORCE plans through the existing Operator registry using composition-injected evidence and policy. Workspace and installed plugins remain declarative and non-executable; public npm embedding and dynamic product-surface registration remain later roadmap stages.

  - id: github_task_loop
    name: GitHub Issues Task Loop
    status: active
    maturity: local_ready
    operatorConfigured: false
    externalBlockers:
      - clean_machine_bot_delivery_smoke_pending
    evidenceRefs:
      - commit:ae04404ddb548da8019754561c11a357ae2b794f
      - test:packages/delivery/src/__tests__/service.test.ts
      - test:packages/github/src/__tests__/watch-daemon.test.ts
    phase: "1.7"
    cli:
      - openslack github
      - openslack agent
      - openslack task
      - openslack delivery
    packages:
      - "@openslack/github"
      - "@openslack/runtime"
      - "@openslack/core"
      - "@openslack/delivery"
    tests: 642
    test_files: 71
    notes: "GitHub Issues task loop active with typed task creation, dry-run repair, Phase 4 watch daemon, installation-scoped GitHub delivery, and strict claim heartbeat/review/complete transitions. The watch daemon now durably accepts Issue, push, PR, review, and check observations through an atomic lease-backed queue with bounded attempts, exponential backoff, retention, compaction, restart recovery, and per-route idempotency/completion. PR/review/check delivery proves access to the event repository and refreshes live state through that explicitly bound client; scope mismatch fails closed without workspace-repository fallback, and review observations remain non-authoritative. Claim lifecycle operations verify structured owner evidence and postconditions, fail closed on partial GitHub state, and provide an idempotent recovery command without republishing a PR. Delivery publishes HEAD and a draft PR through the same GitHub App token, disables host credentials and hooks, synchronizes remote/PR SHAs, and returns AWAITING_GATES evidence for PRMS. Read-only installation-scope diagnostics and a preview-first temporary-ref push/delete probe verify selected-repository access and contents write capability before first delivery."

  - id: operator
    name: Operator Interface
    status: active
    maturity: local_ready
    operatorConfigured: false
    externalBlockers:
      - model_endpoint_not_configured
      - clean_machine_onboarding_smoke_pending
    evidenceRefs:
      - commit:ae04404ddb548da8019754561c11a357ae2b794f
      - test:apps/cli/src/__tests__/setup-onboarding.test.ts
      - test:packages/operator/src/__tests__/executor.test.ts
      - test:packages/operator/src/__tests__/tool-registry.test.ts
      - test:scripts/release/__tests__/verify.test.ts
    phase: "2A/2B/2C"
    cli:
      - openslack ask
      - openslack setup
      - openslack status
      - openslack doctor
      - openslack version
      - openslack chat
    packages:
      - "@openslack/cli"
      - "@openslack/operator"
      - "@openslack/chat-gateway"
      - "@openslack/tui"
      - "@openslack/credentials"
    tests: 924
    test_files: 108
    notes: Structured planner active. Webhook and Slack chat adapters active with actor mapping. PRMS chat cards and action confirmation active. The typed Operator action registry is instance-scoped, preserves the closed 30-action built-in default, accepts explicit planner/executor injection, and canonical-revalidates frozen PlanSteps at execution. The CLI application composition root constructs one sealed PluginHost and instance-scoped Operator action, LLM-provider, conversation-store, and plugin-action bindings per process. Its host target catalog exposes only the audited bounded github.metrics returned-item count under the exact github.issues.read capability; SHADOW plugin actions remain visibility-only, while ENFORCE proof plans are rebuilt through the same canonical registry before execution. All other built-ins and all unconfigured plugin authority remain fail-closed until complete behavior contracts, policy, activation evidence, and a durable audit sink are explicitly composed. LLM-first intent routing with deterministic keyword fallback, setup report, and 24h pending plan store active. Session-based conversation memory with multi-turn context resolution and progressive clarification. Doctor --format plain for non-technical output. Conversation-first TUI workbench with Ask OpenSlack, Operator recommendation cards, workflow draft-first cards, profile sync recommendations, and subagent mention dispatch. TUI setup report view and PR doctor view via --format tui. Versioned Windows x64 and Linux x64 archive builds embed the CLI, workflow assets, native keychain binding, build metadata, SBOM, checksums, and provenance; native build and unpacked smoke are enforced by the release matrix. The installed CLI verifies stable release artifacts and trusted signatures without a source checkout, Bun, or Node.js. Agent Runtime credentials can be previewed and imported atomically into the native keychain without writing secret values to workspace configuration.

