schema: openslack.modules.v1
modules:
  - id: self_evolution
    name: Self-Evolution Kernel
    status: active
    phase: "1.6"
    cli:
      - openslack self
      - openslack workspace
    packages:
      - "@openslack/kernel"
      - "@openslack/workspace"
      - "@openslack/runtime"
    tests: 82
    test_files: 12
    golden_evals: 7

  - id: github_task_loop
    name: GitHub Issues Task Loop
    status: active
    phase: "1.7"
    cli:
      - openslack github
      - openslack agent
      - openslack task
    packages:
      - "@openslack/github"
      - "@openslack/runtime"
      - "@openslack/core"
    tests: 35
    test_files: 4
    notes: GitHub Issues task loop active with typed task creation preview/create UX and dry-run-first repair commands.

  - id: operator
    name: Operator Interface
    status: active
    phase: "2A/2B/2C"
    cli:
      - openslack ask
      - openslack setup
      - openslack status
      - openslack doctor
      - openslack chat
    packages:
      - "@openslack/cli"
      - "@openslack/operator"
      - "@openslack/chat-gateway"
    tests: 87
    test_files: 12
    notes: Structured planner active. Webhook and Slack chat adapters active with actor mapping. PRMS chat cards and action confirmation active. Typed tool registry, optional LLM fallback, setup report, and 24h pending plan store active.

  - id: pr_review_merge
    name: PR Review & Merge Steward
    status: active
    phase: "1.14"
    cli:
      - openslack pr
      - openslack governance
    packages:
      - "@openslack/pr"
      - "@openslack/github"
      - "@openslack/kernel"
    tests: 80
    test_files: 11
    notes: Phase 2C chat report and action confirmation active. Supports status/review/recommend/doctor/queue/merge/watch, review/doctor comments, governance audit, operational decision summaries, deadlock detection, Red Zone author-risk preflight, and chat-friendly PR summaries with confirm-merge flow.

  - id: collaboration
    name: Collaboration Layer
    status: active
    phase: "2D/2E"
    cli:
      - openslack collaboration activity
      - openslack collaboration digest
      - openslack collaboration handoff
      - openslack collaboration decision
      - openslack collaboration room
      - openslack collaboration workflow
    packages:
      - "@openslack/collaboration"
    tests: 91
    test_files: 9
    notes: Full 2D/2E Collaboration Layer active with typed workflow template preview/execute and projection-only dashboard. Event model, activity feed, digest, handoff, decision, and room views. PRMS doctor, governance audit, operator plan, chat, repair, and workflow events hooked. Projection-only; reads from .openslack.local/collaboration/events.jsonl and .openslack/collaboration/{handoffs,decisions}/.
