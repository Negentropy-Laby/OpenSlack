schema: openslack.modules.v1
vitest_tests: 1706
vitest_files: 141
modules:
  - id: self_evolution
    name: Self-Evolution Kernel
    status: active
    phase: "1.6"
    cli:
      - openslack self
      - openslack workspace
    packages:
      - "@openslack/kernel"
      - "@openslack/workspace"
      - "@openslack/runtime"
    tests: 181
    test_files: 20
    golden_evals: 7

  - id: github_task_loop
    name: GitHub Issues Task Loop
    status: active
    phase: "1.7"
    cli:
      - openslack github
      - openslack agent
      - openslack task
    packages:
      - "@openslack/github"
      - "@openslack/runtime"
      - "@openslack/core"
    tests: 262
    test_files: 29
    notes: "GitHub Issues task loop active with typed task creation, dry-run repair, and Phase 4 watch daemon (webhook receiver, dedupe, console/Slack/webhook notifications, polling fallback, optional auto-claim with agent identity and authorization gates, collaboration event recording)."

  - id: operator
    name: Operator Interface
    status: active
    phase: "2A/2B/2C"
    cli:
      - openslack ask
      - openslack setup
      - openslack status
      - openslack doctor
      - openslack chat
    packages:
      - "@openslack/cli"
      - "@openslack/operator"
      - "@openslack/chat-gateway"
      - "@openslack/tui"
    tests: 472
    test_files: 60
    notes: Structured planner active. Webhook and Slack chat adapters active with actor mapping. PRMS chat cards and action confirmation active. Typed tool registry, optional LLM fallback, setup report, and 24h pending plan store active. Session-based conversation memory with multi-turn context resolution and progressive clarification. Doctor --format plain for non-technical output. TUI setup report view and PR doctor view via --format tui.

  - id: pr_review_merge
    name: PR Review & Merge Steward
    status: active
    phase: "1.14"
    cli:
      - openslack pr
      - openslack governance
    packages:
      - "@openslack/pr"
      - "@openslack/github"
      - "@openslack/kernel"
    tests: 279
    test_files: 30
    notes: Phase 2C chat report and action confirmation active. Supports status/review/recommend/doctor/queue/merge/watch, review/doctor comments, governance audit, operational decision summaries, deadlock detection, Red Zone author-risk preflight, and chat-friendly PR summaries with confirm-merge flow.

  - id: collaboration
    name: Collaboration Layer
    status: active
    phase: "2D/2E"
    cli:
      - openslack collaboration activity
      - openslack collaboration digest
      - openslack collaboration handoff
      - openslack collaboration decision
      - openslack collaboration room
      - openslack collaboration workflow list
      - openslack collaboration workflow show
      - openslack collaboration workflow validate
      - openslack collaboration workflow preview
      - openslack collaboration workflow preview-js
      - openslack collaboration workflow dry-run
      - openslack collaboration workflow run
      - openslack collaboration workflow resume
      - openslack collaboration workflow trust
      - openslack collaboration workflow publish
      - openslack collaboration workflow review-request
      - openslack collaboration workflow audit-run
      - openslack collaboration workflow split
      - openslack collaboration workflow improvement
      - openslack collaboration workflow finalize-pr
      - openslack collaboration workflow labels
      - openslack collaboration inspect
      - openslack collaboration workflow profile-sync check
      - openslack collaboration workflow profile-sync preview
      - openslack collaboration workflow profile-sync run
      - openslack collaboration workflow profile-sync status
    packages:
      - "@openslack/collaboration"
      - "@openslack/workflows"
      - "@openslack/tui"
      - "@openslack/github"
    tests: 1086
    test_files: 78
    notes: Full 2D/2E Collaboration Layer active with typed workflow template preview/execute and dashboard with filters (--owner, --module, --risk, --blocker, --type). Workflow engine with JS module discovery, preview, dry-run, execute, resume, trust levels, and inspect (HTML/JSON/Markdown). Event model, activity feed, digest, handoff, decision, and room views with agent display name resolution. Authz-gated chat cards for handoffs, decisions, tasks, workflows, and plans. Agent registry v1 to v2 migration command. TUI dashboard and room views via --format tui. Full workflow GitHub Issues lifecycle including proposal, review, run audit, improvement (with CLI), split with native sub-issue linking and linear dependency fallback, workflow-aware PRMS gate (BLOCKED_WORKFLOW_GATE), and post-merge lifecycle finalizer. Profile Sync Robot active with config-driven check/preview/run, idempotent branch naming, failure issue creation, profile_sync.failed event, watch-daemon auto-pr trigger (manual/watch/auto-pr modes), dedupe queue/worker, TUI profile workbench with 6 actions, PRMS profile-sync governance gate (BLOCKED_PROFILE_SYNC_GATE), and buildProfileSyncStatus finalizer.
